<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Gerenciador de Tarefas{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
        }

        main {
            minimum-height: 400px;
        }

        .mensagens {
            margin-bottom: 15px;
        }

        .alert {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid;
        }

        .alert-success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .btn {
            padding: 8px 15px;
            border: 1px solid #999;
            background-color: #e0e0e0;
            cursor: pointer;
            margin: 5px;
            font-size: 1em;
            text-decoration: none;
            color: black;
            display: inline-block;
        }

        .btn:hover {
            background-color: #d0d0d0;
        }

        .btn-verde {
            background-color: #4CAF50;
            color: white;
            border: 1px solid #4CAF50;
        }

        .btn-verde:hover {
            background-color: #45a049;
        }

        .btn-vermelho {
            background-color: #f44336;
            color: white;
            border: 1px solid #f44336;
        }

        .btn-vermelho:hover {
            background-color: #da190b;
        }

        .tarefa {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .tarefa-titulo {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .tarefa-completa .tarefa-titulo {
            text-decoration: line-through;
            color: #888;
        }

        .tarefa-cancelada .tarefa-titulo {
            text-decoration: line-through;
            color: #999;
        }

        .tarefa-perdida .tarefa-titulo {
            color: #f44336;
            text-decoration: line-through;
        }

        .tarefa-categoria {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .tarefa-descricao {
            color: #333;
            margin-bottom: 10px;
        }

        .tarefa-status {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .tarefa-botoes {
            margin-top: 10px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            font-size: 1em;
            font-family: Arial, sans-serif;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .vazio {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        footer {
            background-color: #f5f5f5;
            padding: 10px;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .tarefa-botoes {
                display: flex;
                flex-direction: column;
            }

            .btn {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tarefas</h1>
        </header>

        <main>
            {% if messages %}
                <div class="mensagens">
                    {% for message in messages %}
                        <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-success{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block conteudo %}{% endblock %}
        </main>

        <footer>
            <p>Sistema de Gerenciamento de Tarefas</p>
        </footer>
    </div>
</body>
</html>
