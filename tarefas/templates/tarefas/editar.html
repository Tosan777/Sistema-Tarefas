{% extends 'base.html' %}

{% block titulo %}Editar Tarefa{% endblock %}

{% block conteudo %}
<h2>Editar Tarefa</h2>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Título:</label>
        <input type="text" name="titulo" value="{{ tarefa.titulo }}" required>
    </div>

    <div class="form-group">
        <label>Descrição:</label>
        <textarea name="descricao" required>{{ tarefa.descricao }}</textarea>
    </div>

    <div class="form-group">
        <label>Categoria:</label>
        <select name="categoria" required>
            {% for categoria in categorias %}
                <option value="{{ categoria.id }}" {% if tarefa.categoria.id == categoria.id %}selected{% endif %}>
                    {{ categoria.nome }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-verde">Atualizar</button>
    <a href="/" class="btn">Cancelar</a>
</form>
{% endblock %}
